name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Static checks
        run: ./scripts/test.sh static

      - name: Unit tests
        run: ./scripts/test.sh unit
